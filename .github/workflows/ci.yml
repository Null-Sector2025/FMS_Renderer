name: FMS_Renderer 全平台自动编译 CI
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  # 任务1：Python 脚本库编译&单元测试
  build-python:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装依赖 numpy
        run: |
          cd python_fms
          python3 -m pip install numpy
      - name: 打包Python FMS库
        run: |
          cd python_fms
          python3 build.py
      - name: 上传Python编译产物
        uses: actions/upload-artifact@v4
        with:
          name: fms-python-dist
          path: python_fms/dist

  # 任务2：C++ 底层内核编译（arm64-v8a NDK + x86_64 Linux）
  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
      - name: 安装编译依赖
        run: sudo apt update && sudo apt install cmake gcc g++ make unzip
      - name: 配置 Android NDK r27
        uses: android-actions/setup-android@v3
        with:
          ndk-version: "27.0.12077973"
      - name: CMake 编译 C++ FMS内核
        run: |
          cd cpp_fms
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=../build_tools/ndk.toolchain.cmake
          cmake --build build -j$(nproc)
      - name: 上传C++静态库
        uses: actions/upload-artifact@v4
        with:
          name: fms-cpp-lib
          path: cpp_fms/build/libfms_core.a

  # 任务3：C# MAUI 编辑器编译（Windows + Ubuntu）
  build-csharp:
    runs-on: windows-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
      - name: 配置 .NET 8 MAUI
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: 安装MAUI工作负载
        run: dotnet workload install maui
      - name: 发布C#编辑器Release
        run: |
          cd csharp_fms
          dotnet publish -c Release
      - name: 上传C#编译产物
        uses: actions/upload-artifact@v4
        with:
          name: fms-csharp-editor
          path: csharp_fms/bin/Release

  # 任务4：Java Android APK编译（Gradle）
  build-java-android:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
      - name: 配置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: Gradle 权限修复
        run: chmod +x java_fms/gradlew
      - name: 编译Release APK
        run: |
          cd java_fms
          ./gradlew assembleRelease
      - name: 上传安卓APK
        uses: actions/upload-artifact@v4
        with:
          name: fms-android-apk
          path: java_fms/app/build/outputs/apk/release/*.apk

  # 任务5：MC模型校验 + 全产物打包汇总
  package-all:
    needs: [build-python, build-cpp, build-csharp, build-java-android]
    runs-on: ubuntu-latest
    steps:
      - name: 拉取完整源码
        uses: actions/checkout@v4
      # 下载所有平台编译产物
      - name: 下载Python包
        uses: actions/download-artifact@v4
        with:
          name: fms-python-dist
          path: build_out/python
      - name: 下载C++内核库
        uses: actions/download-artifact@v4
        with:
          name: fms-cpp-lib
          path: build_out/cpp
      - name: 下载C#编辑器
        uses: actions/download-artifact@v4
        with:
          name: fms-csharp-editor
          path: build_out/csharp
      - name: 下载Android APK
        uses: actions/download-artifact@v4
        with:
          name: fms-android-apk
          path: build_out/android
      # 打包完整发布压缩包
      - name: 打包全平台发布包
        run: tar -zcvf FMS_Renderer_Full_Build.tar.gz build_out docs mc_models build_tools
      - name: 上传完整发布压缩包
        uses: actions/upload-artifact@v4
        with:
          name: FMS_Renderer_Full_Build
          path: FMS_Renderer_Full_Build.tar.gz
