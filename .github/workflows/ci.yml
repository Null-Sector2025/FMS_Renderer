name: FMS_Renderer 全平台自动编译 CI
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装numpy
        run: cd python_fms && python3 -m pip install numpy
      - name: 打包Python库
        run: cd python_fms && python3 build.py
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: fms-python-dist
          path: python_fms/dist

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装编译依赖
        run: sudo apt update && sudo apt install cmake gcc g++ make unzip
      - name: 配置NDK r27
        uses: android-actions/setup-android@v3
        with:
          ndk-version: "27.0.12077973"
      - name: CMake编译
        run: |
          cd cpp_fms
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=../build_tools/ndk.toolchain.cmake
          cmake --build build -j$(nproc)
      - name: 上传静态库
        uses: actions/upload-artifact@v4
        with:
          name: fms-cpp-lib
          path: cpp_fms/build/libfms_core.a

  build-csharp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装.NET9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: 安装MAUI9工作负载
        run: dotnet workload install maui
      - name: 发布Windows端
        run: cd csharp_fms && dotnet publish FMSCurveEditor.csproj -c Release -f net9.0-windows -o bin/Release/win
      - name: 发布Android端
        run: cd csharp_fms && dotnet publish FMSCurveEditor.csproj -c Release -f net9.0-android -o bin/Release/android
      - name: 上传编辑器包
        uses: actions/upload-artifact@v4
        with:
          name: fms-csharp-editor
          path: csharp_fms/bin/Release

  build-java-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JDK17 环境
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      - name: 下载并部署Gradle 8.7（分步校验，失败直接退出）
        run: |
          set -e
          cd java_fms
          echo "1. 创建gradle/wrapper目录"
          mkdir -p gradle/wrapper
          ls -ld gradle
          echo "2. 下载gradle-8.7-all.zip"
          wget --progress=bar:force:noscroll https://services.gradle.org/distributions/gradle-8.7-all.zip
          echo "3. 解压压缩包"
          unzip -o gradle-8.7-all.zip
          echo "4. 重命名解压文件夹"
          mv gradle-8.7 gradle_bin
          ls -ld gradle_bin
          echo "5. 复制gradlew启动脚本"
          cp gradle_bin/bin/gradlew ./gradlew
          echo "6. 复制wrapper jar包"
          cp gradle_bin/lib/wrapper/gradle-wrapper.jar gradle/wrapper/
          echo "7. 写入gradle-wrapper配置"
          echo "distributionUrl=https\://services.gradle.org/distributions/gradle-8.7-all.zip" > gradle/wrapper/gradle-wrapper.properties
          echo "8. 添加执行权限"
          chmod +x gradlew
          echo "=== 校验生成文件 ==="
          ls -la gradlew gradle/wrapper/
      - name: 编译Release APK（完整日志输出）
        run: cd java_fms && ./gradlew assembleRelease --stacktrace --info
      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: fms-android-apk
          path: java_fms/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

  package-all:
    needs: [build-python, build-cpp, build-csharp, build-java-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 下载全部编译产物
        uses: actions/download-artifact@v4
        with:
          path: build_out
      - name: 打包完整发行包
        run: tar -zcvf FMS_Renderer_Full_Build.tar.gz build_out docs build_tools mc_models
      - name: 上传压缩包
        uses: actions/upload-artifact@v4
        with:
          name: FMS_Renderer_Full_Build
          path: FMS_Renderer_Full_Build.tar.gz
