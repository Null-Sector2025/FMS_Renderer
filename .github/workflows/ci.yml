name: FMS_Renderer 全平台自动编译 CI
on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4
      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: 安装numpy
        run: cd python_fms && python3 -m pip install numpy
      - name: 打包Python库
        run: cd python_fms && python3 build.py
      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: fms-python-dist
          path: python_fms/dist

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装编译依赖
        run: sudo apt update && sudo apt install cmake gcc g++ make unzip
      - name: 配置NDK r27
        uses: android-actions/setup-android@v3
        with:
          ndk-version: "27.0.12077973"
      - name: CMake编译
        run: |
          cd cpp_fms
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=../build_tools/ndk.toolchain.cmake
          cmake --build build -j$(nproc)
      - name: 上传lib
        uses: actions/upload-artifact@v4
        with:
          name: fms-cpp-lib
          path: cpp_fms/build/libfms_core.a

  build-csharp:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: 配置.NET8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: 安装MAUI workload
        run: dotnet workload install maui
      - name: 发布编辑器
        run: cd csharp_fms && dotnet publish FMSCurveEditor.csproj -c Release
      - name: 上传编辑器包
        uses: actions/upload-artifact@v4
        with:
          name: fms-csharp-editor
          path: csharp_fms/bin/Release

  build-java-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: JDK17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
      # CI在线生成gradlew，Termux本地无需安装gradle耗流量
      - name: 自动生成Gradle Wrapper
        run: |
          cd java_fms
          gradle wrapper --gradle-version 8.7
          chmod +x gradlew
      - name: 编译APK
        run: cd java_fms && ./gradlew assembleRelease
      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: fms-android-apk
          path: java_fms/app/build/outputs/apk/release/*.apk

  package-all:
    needs: [build-python, build-cpp, build-csharp, build-java-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 下载全部产物
        uses: actions/download-artifact@v4
        with:
          path: build_out
      - name: 打包完整发行包
        run: tar -zcvf FMS_Renderer_Full_Build.tar.gz build_out docs build_tools
      - name: 上传压缩包
        uses: actions/upload-artifact@v4
        with:
          name: FMS_Renderer_Full_Build
          path: FMS_Renderer_Full_Build.tar.gz
